<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Patients — ObturaScore AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Syne+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="shared.css"/>
  <link rel="stylesheet" href="patients.css"/>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="main-content">
    <header class="topbar">
      <button class="mobile-toggle" id="mobileToggle">
        <svg viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <div>
        <div class="topbar-title">Patients</div>
        <div class="topbar-subtitle">Manage your patient records</div>
      </div>
      <div class="topbar-spacer"></div>
      <div class="topbar-search">
        <svg viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.3"/><path d="M10.5 10.5l2.5 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <input type="text" placeholder="Search patients… ⌘K" id="globalSearch"/>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-accent btn-sm" id="addPatientBtn">
          <svg viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          Add Patient
        </button>
        <a class="topbar-avatar" href="profile.html">DS</a>
      </div>
    </header>

    <main class="page-content">

      <!-- Stats Row -->
      <div class="stat-grid pt-stats fade-up">
        <div class="stat-card">
          <div class="stat-card-icon purple">
            <svg viewBox="0 0 20 20" fill="none"><circle cx="8" cy="6" r="3" stroke="currentColor" stroke-width="1.4"/><path d="M2 17c0-3.314 2.686-6 6-6s6 2.686 6 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M15 8v6M12 11h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          </div>
          <div class="stat-card-num" data-count="84">0</div>
          <div class="stat-card-label">Total Patients</div>
          <div class="stat-card-delta">↑ +5 this month</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon blue">
            <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="13" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M7 2v4M13 2v4M3 9h14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          </div>
          <div class="stat-card-num" data-count="12">0</div>
          <div class="stat-card-label">Scheduled This Week</div>
          <div class="stat-card-delta">2 today</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon orange">
            <svg viewBox="0 0 20 20" fill="none"><path d="M10 3v7m0 0l3-3m-3 3L7 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 13v2a2 2 0 002 2h8a2 2 0 002-2v-2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          </div>
          <div class="stat-card-num" data-count="18">0</div>
          <div class="stat-card-label">Pending Recall</div>
          <div class="stat-card-delta neg">↑ +2 overdue</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon red">
            <svg viewBox="0 0 20 20" fill="none"><path d="M10 2a8 8 0 100 16A8 8 0 0010 2zm0 4v4m0 2.5v.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          </div>
          <div class="stat-card-num" data-count="6">0</div>
          <div class="stat-card-label">Retreatment Needed</div>
          <div class="stat-card-delta neg">Action required</div>
        </div>
      </div>

      <!-- Filters + Table -->
      <div class="card fade-up" style="animation-delay:.1s">
        <div class="pt-toolbar">
          <div class="pt-search">
            <svg viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.3"/><path d="M10.5 10.5l2.5 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            <input type="text" placeholder="Filter patients…" id="tableSearch"/>
          </div>
          <div class="pt-filters">
            <select class="form-input form-select filter-sel" id="statusFilter">
              <option value="">All Status</option>
              <option value="optimal">Optimal</option>
              <option value="acceptable">Acceptable</option>
              <option value="suboptimal">Suboptimal</option>
              <option value="poor">Poor</option>
            </select>
            <select class="form-input form-select filter-sel" id="sortFilter">
              <option value="name">Sort: Name</option>
              <option value="score">Sort: Score</option>
              <option value="date">Sort: Last Visit</option>
              <option value="id">Sort: ID</option>
            </select>
            <button class="btn btn-ghost btn-sm" id="viewToggle" title="Toggle view">
              <svg id="viewIcon" viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="11" y="2" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="2" y="11" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="11" y="11" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.4"/></svg>
            </button>
          </div>
        </div>

        <!-- Table View -->
        <div id="tableView">
          <table class="data-table" id="patientTable">
            <thead>
              <tr>
                <th>Patient</th>
                <th>ID</th>
                <th>Age</th>
                <th>Tooth</th>
                <th>Last Visit</th>
                <th>Last Score</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="patientTableBody"></tbody>
          </table>
        </div>

        <!-- Grid View (hidden) -->
        <div id="gridView" style="display:none" class="pt-grid" id="patientGrid"></div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
      </div>

    </main>
  </div>
</div>

<!-- Add / Edit Patient Modal -->
<div class="modal-overlay" id="patientModal" style="display:none">
  <div class="modal-card pt-modal-card">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add New Patient</div>
      <button class="modal-close-btn" data-close-modal>
        <svg viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First Name *</label>
          <input type="text" class="form-input" id="ptFirstName" placeholder="Riya"/>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name *</label>
          <input type="text" class="form-input" id="ptLastName" placeholder="Arora"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Age</label>
          <input type="number" class="form-input" id="ptAge" placeholder="34" min="1" max="120"/>
        </div>
        <div class="form-group">
          <label class="form-label">Gender</label>
          <select class="form-input form-select" id="ptGender">
            <option value="">Select</option>
            <option>Female</option><option>Male</option><option>Other</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="tel" class="form-input" id="ptPhone" placeholder="+91 98765 43210"/>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="ptEmail" placeholder="patient@email.com"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Medical History / Notes</label>
        <textarea class="form-input form-textarea" id="ptNotes" placeholder="Diabetes, hypertension, allergies…"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Tooth No.</label>
          <select class="form-input form-select" id="ptTooth">
            <option value="">—</option>
            <option>11</option><option>12</option><option>13</option><option>14</option><option>15</option>
            <option>16</option><option>17</option><option>21</option><option>22</option><option>26</option>
            <option>36</option><option>37</option><option>46</option><option>47</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Recall Interval</label>
          <select class="form-input form-select" id="ptRecall">
            <option>3 months</option><option>6 months</option><option>12 months</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close-modal>Cancel</button>
      <button class="btn btn-accent" id="savePatientBtn">
        <svg viewBox="0 0 16 16" fill="none"><path d="M3 8l3 3 7-6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Save Patient
      </button>
    </div>
  </div>
</div>

<!-- Patient Detail Modal -->
<div class="modal-overlay" id="detailModal" style="display:none">
  <div class="modal-card pt-detail-card">
    <div class="modal-header">
      <div class="modal-title" id="detailName">Patient Detail</div>
      <button class="modal-close-btn" data-close-modal>
        <svg viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div id="detailBody"></div>
  </div>
</div>

<style>
.toast{position:fixed;bottom:24px;right:24px;background:var(--dark);color:white;padding:12px 18px;border-radius:var(--radius-md);font-size:.875rem;display:flex;align-items:center;gap:8px;z-index:9999;transform:translateY(20px);opacity:0;transition:all .3s;box-shadow:var(--shadow-lg)}
.toast.show{transform:translateY(0);opacity:1}
.toast svg{width:14px;height:14px}
.toast-error{background:var(--poor)}
</style>

<script src="sidebar.js"></script>
<script src="shared.js"></script>
<script src="patients.js"></script>
</body>
</html>
